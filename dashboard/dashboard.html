<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GoldBot Dashboard — Gold Only</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');
  :root {
    --bg:#0a0c10; --surface:#111520; --border:#1e2535; --gold:#f0b429;
    --green:#22c55e; --red:#ef4444; --text:#e2e8f0; --muted:#64748b;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:14px; }
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 28px;
    display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; }
  .logo { display:flex; align-items:center; gap:12px; font-size:18px; font-weight:600; }
  .logo span { color:var(--gold); }
  .live-badge { display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--green); }
  .pulse { width:8px; height:8px; background:var(--green); border-radius:50%; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(1.3);} }
  #last-update { font-family:var(--mono); font-size:11px; color:var(--muted); }
  main { max-width:1100px; margin:0 auto; padding:24px 28px; display:flex; flex-direction:column; gap:24px; }
  .account-bar { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .acc-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px 22px; }
  .acc-label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:8px; }
  .acc-value { font-family:var(--mono); font-size:26px; font-weight:600; }
  .acc-value.gold{color:var(--gold);} .acc-value.green{color:var(--green);} .acc-value.neg{color:var(--red);}
  .price-card { background:var(--surface); border:1px solid var(--gold); border-radius:10px; padding:16px 18px; }
  .price-symbol { font-size:12px; font-weight:600; color:var(--gold); letter-spacing:1px; margin-bottom:10px; }
  .price-row { display:flex; justify-content:space-between; align-items:baseline; gap:8px; margin-bottom:4px; }
  .price-lbl { font-size:10px; color:var(--muted); }
  .price-val { font-family:var(--mono); font-size:16px; font-weight:600; }
  .price-bid{color:var(--red);} .price-ask{color:var(--green);}
  .section-hdr { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .section-hdr h2 { font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); }
  .badge { background:var(--border); font-family:var(--mono); font-size:11px; padding:2px 8px; border-radius:20px; }
  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; }
  thead tr { background:#0d1117; border-bottom:1px solid var(--border); }
  th { padding:11px 16px; text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
  td { padding:12px 16px; font-size:13px; border-bottom:1px solid #151a24; }
  tr:last-child td{border-bottom:none;} tr:hover td{background:#141824;}
  .td-mono{font-family:var(--mono); font-size:12px;}
  .tag { display:inline-block; padding:3px 9px; border-radius:4px; font-family:var(--mono); font-size:11px; font-weight:600; }
  .tag-buy{background:#14532d; color:var(--green);} .tag-sell{background:#450a0a; color:var(--red);}
  .profit-pos{color:var(--green); font-family:var(--mono); font-weight:600;}
  .profit-neg{color:var(--red); font-family:var(--mono); font-weight:600;}
  .profit-zero{color:var(--muted); font-family:var(--mono);}
  .empty-row td { text-align:center; color:var(--muted); padding:32px; font-style:italic; }
  .comment-pill { font-size:10px; font-family:var(--mono); color:var(--muted); background:#1a1f2e; padding:2px 7px; border-radius:4px; }
</style>
</head>
<body>
<header>
  <div class="logo">📈 Gold<span>Bot</span> Dashboard — Gold Only</div>
  <div style="display:flex;align-items:center;gap:20px;">
    <div class="live-badge"><div class="pulse"></div>LIVE</div>
    <div id="last-update">Loading...</div>
  </div>
</header>
<main><div style="text-align:center;padding:60px;color:var(--muted);">Loading...</div></main>

<script>
async function fetchData() {
  try {
    const res = await fetch('/api/data');
    const data = await res.json();
    render(data);
    document.getElementById('last-update').textContent = 'Last update: ' + data.timestamp;
  } catch(e) {
    document.getElementById('last-update').textContent = 'Connection error — retry...';
  }
}
function pClass(v){ return v>0?'profit-pos':v<0?'profit-neg':'profit-zero'; }
function pSign(v){ return (v>0?'+':'')+v.toFixed(2); }

function render(d) {
  let html = '';
  const profitClass = d.profit >= 0 ? 'green' : 'neg';
  html += `<div class="account-bar">
    <div class="acc-card"><div class="acc-label">Balance</div><div class="acc-value gold">$${d.balance.toFixed(2)}</div></div>
    <div class="acc-card"><div class="acc-label">Equity</div><div class="acc-value gold">$${d.equity.toFixed(2)}</div></div>
    <div class="acc-card"><div class="acc-label">Open P&L</div><div class="acc-value ${profitClass}">${pSign(d.profit)}</div></div>
  </div>`;

  html += `<div><div class="section-hdr"><h2>Live Price</h2></div>`;
  const p = d.prices['XAUUSDm'];
  html += `<div class="price-card"><div class="price-symbol">XAUUSDm ⭐</div>`;
  if (p) {
    html += `<div class="price-row"><span class="price-lbl">BID</span><span class="price-val price-bid">${p.bid}</span></div>
             <div class="price-row"><span class="price-lbl">ASK</span><span class="price-val price-ask">${p.ask}</span></div>`;
  } else { html += `<div style="color:var(--muted);font-size:12px;">No data</div>`; }
  html += `</div></div>`;

  const openCount = d.open.length;
  html += `<div><div class="section-hdr"><h2>Open Trades</h2><span class="badge">${openCount}</span></div>
    <div class="table-wrap"><table><thead><tr>
      <th>Ticket</th><th>Type</th><th>Lot</th><th>Entry</th><th>Current</th>
      <th>SL</th><th>TP</th><th>P&L</th><th>Open Time (PKT)</th><th>Strategy</th>
    </tr></thead><tbody>`;
  if (openCount === 0) {
    html += `<tr class="empty-row"><td colspan="10">Koi open trade nahi hai</td></tr>`;
  } else {
    for (const t of d.open) {
      html += `<tr>
        <td class="td-mono">#${t.ticket}</td>
        <td><span class="tag tag-${t.type.toLowerCase()}">${t.type}</span></td>
        <td class="td-mono">${t.lot}</td><td class="td-mono">${t.entry}</td>
        <td class="td-mono">${t.current}</td>
        <td class="td-mono" style="color:var(--red)">${t.sl}</td>
        <td class="td-mono" style="color:var(--green)">${t.tp}</td>
        <td class="${pClass(t.profit)}">${pSign(t.profit)}</td>
        <td class="td-mono" style="font-size:11px">${t.open_time}</td>
        <td><span class="comment-pill">${t.comment}</span></td>
      </tr>`;
    }
  }
  html += `</tbody></table></div></div>`;

  const histCount = d.history.length;
  html += `<div><div class="section-hdr"><h2>Trade History</h2><span class="badge">${histCount}</span></div>
    <div class="table-wrap"><table><thead><tr>
      <th>Ticket</th><th>Type</th><th>Lot</th><th>Entry</th><th>Close</th>
      <th>P&L</th><th>Open Time (PKT)</th><th>Close Time (PKT)</th><th>Strategy</th>
    </tr></thead><tbody>`;
  if (histCount === 0) {
    html += `<tr class="empty-row"><td colspan="9">Koi trade history nahi</td></tr>`;
  } else {
    for (const t of d.history) {
      html += `<tr>
        <td class="td-mono">#${t.ticket}</td>
        <td><span class="tag tag-${t.type.toLowerCase()}">${t.type}</span></td>
        <td class="td-mono">${t.lot}</td><td class="td-mono">${t.entry}</td>
        <td class="td-mono">${t.close}</td>
        <td class="${pClass(t.profit)}">${pSign(t.profit)}</td>
        <td class="td-mono" style="font-size:11px">${t.open_time}</td>
        <td class="td-mono" style="font-size:11px">${t.close_time}</td>
        <td><span class="comment-pill">${t.comment}</span></td>
      </tr>`;
    }
  }
  html += `</tbody></table></div></div>`;

  document.querySelector('main').innerHTML = html;
}
fetchData();
setInterval(fetchData, 5000);
</script>
</body>
</html>
